<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>xSonomy // UAV Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
/* ============================================================
   xSonomy UAV CATALOGUE — hangar / loadout aesthetic
   ============================================================ */
:root {
  --bg-0:#0a0d10; --bg-1:#0f1418; --bg-2:#141a1f; --bg-3:#1a2128;
  --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.14);
  --ink-0:#e7ecef; --ink-1:#b8c2c8; --ink-2:#6b7780; --ink-3:#44505a;
  --accent:#ff7a1a; --accent-soft:rgba(255,122,26,0.12); --accent-line:rgba(255,122,26,0.45);
  --warn:#ffcc33; --bad:#ff3b3b; --good:#6be675; --restricted:#ff3b6b;
  --mono:ui-monospace,"JetBrains Mono","IBM Plex Mono",Menlo,Consolas,monospace;
  --sans:"Inter Tight","Helvetica Neue",system-ui,sans-serif;
  --display:"Oswald","Bebas Neue","Inter Tight",sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg-0);color:var(--ink-0);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px,40px 40px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);pointer-events:none;z-index:1;}
.app{position:relative;z-index:2;}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--bg-1),var(--bg-0));position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);}
.brand{display:flex;align-items:center;gap:14px;font-family:var(--display);letter-spacing:0.18em;}
.brand-mark{width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent);position:relative;}
.brand-mark::before,.brand-mark::after{content:"";position:absolute;width:6px;height:6px;border:1px solid var(--accent);}
.brand-mark::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
.brand-mark::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
.brand-text{display:flex;flex-direction:column;line-height:1;}
.brand-text .b1{font-size:18px;color:var(--ink-0);}
.brand-text .b2{font-size:9px;color:var(--ink-2);margin-top:5px;letter-spacing:0.3em;}
.topbar-nav{display:flex;gap:4px;}
.topbar-nav a{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-1);padding:8px 14px;border:1px solid transparent;text-decoration:none;position:relative;cursor:pointer;}
.topbar-nav a.active{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft);}
.topbar-nav a.disabled{color:var(--ink-3);cursor:not-allowed;}
.topbar-nav a:hover:not(.active):not(.disabled){color:var(--ink-0);border-color:var(--line);}
.topbar-meta{display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:0.15em;}
.topbar-meta .pulse{display:inline-block;width:6px;height:6px;background:var(--good);border-radius:50%;margin-right:6px;box-shadow:0 0 8px var(--good);animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{50%{opacity:0.35;}}

/* Hero */
.hero{position:relative;border-bottom:1px solid var(--line);padding:28px;display:grid;grid-template-columns:1.2fr 2fr 1fr;gap:28px;background:radial-gradient(ellipse 70% 100% at 70% 50%,var(--accent-soft) 0%,transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);min-height:360px;}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;color:var(--accent);margin-bottom:12px;}
.hero-title{font-family:var(--display);font-size:52px;line-height:0.95;letter-spacing:0.04em;margin:0 0 8px;text-transform:uppercase;}
.hero-sub{color:var(--ink-1);font-size:14px;margin:0 0 18px;max-width:42ch;}
.hero-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:18px;}
.hero-meta-grid>div{background:var(--bg-1);padding:10px 12px;}
.hero-meta-grid .lbl{font-family:var(--mono);font-size:9px;color:var(--ink-2);letter-spacing:0.2em;margin-bottom:4px;}
.hero-meta-grid .val{font-family:var(--display);font-size:18px;color:var(--ink-0);letter-spacing:0.05em;}
.hero-actions{display:flex;gap:10px;margin-top:22px;}
.hero-render{position:relative;border:1px solid var(--line-2);background:linear-gradient(180deg,var(--bg-2),var(--bg-1));min-height:320px;overflow:hidden;}
.hero-render::before{content:"FEATURED · CATALOGUE";position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:9px;letter-spacing:0.3em;color:var(--accent);z-index:2;}
.hero-render::after{content:"SCH ●";position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--bad);z-index:2;}
.hero-render-corner{position:absolute;width:12px;height:12px;border-color:var(--accent);border-style:solid;border-width:0;z-index:3;}
.hero-render-corner.tl{top:6px;left:6px;border-top-width:1px;border-left-width:1px;}
.hero-render-corner.tr{top:6px;right:6px;border-top-width:1px;border-right-width:1px;}
.hero-render-corner.bl{bottom:6px;left:6px;border-bottom-width:1px;border-left-width:1px;}
.hero-render-corner.br{bottom:6px;right:6px;border-bottom-width:1px;border-right-width:1px;}
.hero-stat-rail{display:flex;flex-direction:column;gap:12px;}
.hero-stat-rail h4{font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--ink-2);margin:0 0 6px;text-transform:uppercase;}
.radar-wrap{border:1px solid var(--line);background:var(--bg-1);padding:16px;position:relative;}

/* Buttons */
.btn{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;padding:10px 16px;background:transparent;border:1px solid var(--line-2);color:var(--ink-0);cursor:pointer;position:relative;display:inline-flex;align-items:center;gap:8px;transition:all 0.15s ease;text-decoration:none;}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.btn.primary{background:var(--accent);color:#0a0d10;border-color:var(--accent);}
.btn.primary:hover{filter:brightness(1.1);color:#0a0d10;}
.btn.ghost{border-color:var(--line);}
.btn.sm{padding:6px 10px;font-size:10px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Layout */
.main-grid{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:100vh;}

/* Sidebar */
.sidebar{border-right:1px solid var(--line);background:var(--bg-1);padding:20px;}
.filter-block{margin-bottom:22px;}
.filter-block h5{font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--ink-2);margin:0 0 10px;display:flex;align-items:center;justify-content:space-between;}
.filter-block h5 .ix{color:var(--accent);font-family:var(--mono);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;padding:5px 9px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink-1);cursor:pointer;transition:all 0.12s;user-select:none;}
.chip:hover{color:var(--ink-0);border-color:var(--line-2);}
.chip.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.chip .ct{color:var(--ink-3);margin-left:6px;}
.chip.on .ct{color:var(--accent);opacity:0.6;}
.range-input{display:flex;flex-direction:column;gap:6px;}
.range-input .vals{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:0.1em;}
.range-input input[type=range]{-webkit-appearance:none;height:2px;background:var(--line-2);width:100%;}
.range-input input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);cursor:pointer;border:2px solid var(--bg-0);}
.range-input input[type=range]::-moz-range-thumb{width:12px;height:12px;background:var(--accent);cursor:pointer;border:2px solid var(--bg-0);}
.reset-row{display:flex;gap:6px;margin-top:20px;border-top:1px dashed var(--line);padding-top:16px;}
.sidebar-frame-corner{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:0.2em;text-align:right;margin-bottom:8px;}

/* Catalogue */
.catalogue{padding:20px 28px 140px;}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.cat-header .title-block{display:flex;align-items:baseline;gap:14px;}
.cat-header h2{font-family:var(--display);font-size:22px;letter-spacing:0.12em;text-transform:uppercase;margin:0;}
.cat-header .count{font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:0.15em;}
.cat-header .count b{color:var(--accent);font-weight:500;}
.cat-controls{display:flex;gap:8px;align-items:center;}
.sort-select{font-family:var(--mono);font-size:10px;background:var(--bg-2);border:1px solid var(--line);color:var(--ink-1);padding:7px 10px;letter-spacing:0.15em;text-transform:uppercase;}
.cat-note{font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:0.1em;border:1px dashed var(--line);background:var(--bg-1);padding:9px 12px;margin-bottom:16px;line-height:1.6;}
.cat-note b{color:var(--warn);font-weight:500;}

/* Grid */
.uav-grid{display:grid;gap:14px;}
.uav-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.uav-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.uav-grid.cols-5{grid-template-columns:repeat(5,1fr);}
@media (max-width:1400px){.uav-grid.cols-5{grid-template-columns:repeat(4,1fr);}}
@media (max-width:1100px){.uav-grid.cols-4,.uav-grid.cols-5{grid-template-columns:repeat(3,1fr);}}

/* Card */
.card{position:relative;background:var(--bg-1);border:1px solid var(--line);display:flex;flex-direction:column;cursor:pointer;transition:all 0.18s ease;overflow:hidden;}
.card:hover{border-color:var(--accent);background:var(--bg-2);transform:translateY(-2px);box-shadow:0 6px 30px -12px var(--accent-soft),0 0 0 1px var(--accent-line) inset;}
.card-corners>i{position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;z-index:4;opacity:0;transition:opacity 0.2s;}
.card:hover .card-corners>i{opacity:1;}
.card-corners .tl{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.card-corners .tr{top:-1px;right:-1px;border-width:1px 1px 0 0;}
.card-corners .bl{bottom:-1px;left:-1px;border-width:0 0 1px 1px;}
.card-corners .br{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-family:var(--mono);font-size:9.5px;color:var(--ink-2);letter-spacing:0.2em;border-bottom:1px solid var(--line);}
.card-head .id{color:var(--accent);}
.tier{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;padding:2px 6px;border:1px solid var(--line-2);}
.tier.MED{color:var(--ink-1);}
.tier.HIGH{color:var(--good);border-color:rgba(107,230,117,0.4);background:rgba(107,230,117,0.08);}
.tier.LOW{color:var(--warn);border-color:rgba(255,204,51,0.4);background:rgba(255,204,51,0.08);}
.card-art{position:relative;aspect-ratio:4 / 3;background:radial-gradient(ellipse at center,var(--bg-2),var(--bg-1) 70%);border-bottom:1px solid var(--line);color:var(--accent);overflow:hidden;}
.card-art .silhouette-mode{position:absolute;inset:14% 14%;display:grid;place-items:center;}
.card-art .schematic-mode{position:absolute;inset:0;}
.card-art .art-tag{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.2em;color:var(--ink-3);}
.card-art .art-tag-r{position:absolute;right:8px;bottom:6px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.15em;color:var(--ink-3);}
.card-body{padding:12px;display:flex;flex-direction:column;gap:10px;}
.card-name{font-family:var(--display);font-size:18px;letter-spacing:0.06em;text-transform:uppercase;margin:0;line-height:1;}
.card-mfr{font-family:var(--mono);font-size:9.5px;color:var(--ink-2);letter-spacing:0.16em;margin-top:3px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-family:var(--mono);font-size:8.5px;letter-spacing:0.18em;padding:3px 6px;border:1px solid var(--line);background:var(--bg-0);color:var(--ink-1);}
.tag.role{color:var(--accent);border-color:var(--accent-line);}
.stat-bars{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.stat-row{display:grid;grid-template-columns:54px 1fr 52px;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.08em;}
.stat-row .lbl{color:var(--ink-2);}
.stat-row .val{color:var(--ink-0);text-align:right;}
.stat-row .val.na{color:var(--ink-3);}
.bar{height:4px;background:var(--bg-3);position:relative;overflow:hidden;}
.bar>i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);background-image:linear-gradient(90deg,transparent 0 50%,rgba(0,0,0,0.25) 50% 100%);background-size:4px 100%;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg-0);font-family:var(--mono);font-size:10px;letter-spacing:0.12em;}
.card-footer .price{color:var(--accent);font-family:var(--display);font-size:16px;letter-spacing:0.05em;}
.card-footer .lt{color:var(--ink-2);}
.card-actions{display:flex;gap:4px;}
.icon-btn{width:26px;height:26px;display:grid;place-items:center;background:transparent;border:1px solid var(--line);color:var(--ink-2);cursor:pointer;transition:all 0.12s;text-decoration:none;}
.icon-btn:hover{color:var(--accent);border-color:var(--accent);}
.icon-btn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.icon-btn svg{display:block;}
.status-flag{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.2em;padding:3px 6px;z-index:2;}
.status-flag.PROD{color:var(--good);border:1px solid rgba(107,230,117,0.4);background:rgba(107,230,117,0.08);}
.status-flag.OTHER{color:var(--warn);border:1px solid rgba(255,204,51,0.4);background:rgba(255,204,51,0.08);}

/* Compare tray */
.compare-tray{position:fixed;bottom:0;left:280px;right:0;background:linear-gradient(180deg,var(--bg-2),var(--bg-1));border-top:1px solid var(--accent-line);padding:14px 28px;display:flex;align-items:stretch;gap:16px;z-index:40;box-shadow:0 -10px 30px -10px rgba(0,0,0,0.6);transform:translateY(0);transition:transform 0.25s ease;}
.compare-tray.empty{transform:translateY(calc(100% - 38px));}
.compare-tray-head{font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--accent);display:flex;align-items:center;gap:10px;border-right:1px solid var(--line);padding-right:16px;flex-direction:column;justify-content:center;min-width:110px;}
.compare-tray-head .ct-title{display:flex;align-items:center;gap:8px;}
.compare-tray-head .ct-sub{font-size:9px;color:var(--ink-2);letter-spacing:0.18em;}
.compare-slots{display:flex;gap:12px;flex:1;}
.compare-slot{flex:1;border:1px dashed var(--line-2);background:var(--bg-0);padding:8px 12px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:0.15em;position:relative;min-height:60px;}
.compare-slot.filled{border-style:solid;border-color:var(--accent-line);background:var(--accent-soft);color:var(--ink-0);}
.compare-slot .num{font-family:var(--display);font-size:18px;color:var(--ink-3);letter-spacing:0;}
.compare-slot.filled .num{color:var(--accent);}
.compare-slot .info{display:flex;flex-direction:column;gap:2px;}
.compare-slot .info .nm{color:var(--ink-0);font-family:var(--display);font-size:14px;letter-spacing:0.05em;}
.compare-slot .info .id{color:var(--accent);font-size:9px;letter-spacing:0.2em;}
.compare-slot .x{position:absolute;top:4px;right:4px;width:18px;height:18px;display:grid;place-items:center;background:transparent;border:none;color:var(--ink-2);cursor:pointer;font-family:var(--mono);}
.compare-slot .x:hover{color:var(--bad);}
.compare-cta{display:flex;align-items:center;padding-left:16px;border-left:1px solid var(--line);}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(5,8,10,0.85);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;padding:40px;}
.modal{width:min(900px,100%);max-height:88vh;background:var(--bg-1);border:1px solid var(--accent-line);display:grid;grid-template-columns:1.1fr 1fr;position:relative;overflow:hidden;}
.modal-close{position:absolute;top:10px;right:10px;width:28px;height:28px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--ink-1);cursor:pointer;z-index:5;font-family:var(--mono);}
.modal-close:hover{color:var(--accent);border-color:var(--accent);}
.modal-art{background:linear-gradient(180deg,var(--bg-2),var(--bg-0));border-right:1px solid var(--line);position:relative;min-height:480px;color:var(--accent);}
.modal-info{padding:28px;overflow-y:auto;}
.modal-id{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.3em;}
.modal-name{font-family:var(--display);font-size:34px;letter-spacing:0.06em;text-transform:uppercase;margin:4px 0 2px;}
.modal-mfr{font-family:var(--mono);font-size:11px;color:var(--ink-2);letter-spacing:0.2em;margin-bottom:16px;}
.modal-summary{color:var(--ink-1);margin-bottom:22px;}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);}
.spec-grid>div{background:var(--bg-1);padding:10px 12px;}
.spec-grid .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--ink-2);margin-bottom:4px;}
.spec-grid .val{font-family:var(--display);font-size:15px;letter-spacing:0.04em;color:var(--ink-0);}
.spec-grid .val.na{color:var(--ink-3);}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.source-note{font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:0.08em;line-height:1.6;margin-top:18px;border-top:1px dashed var(--line);padding-top:14px;}
.source-note b{color:var(--warn);font-weight:500;}
.source-note a{color:var(--accent);text-decoration:none;word-break:break-all;}
.source-note a:hover{text-decoration:underline;}

/* Compare modal */
.cmp-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;}
.cmp-table th,.cmp-table td{border:1px solid var(--line);padding:10px 12px;text-align:left;letter-spacing:0.06em;}
.cmp-table thead th{background:var(--bg-2);color:var(--ink-0);font-family:var(--display);font-size:15px;letter-spacing:0.05em;text-transform:uppercase;}
.cmp-table thead th:first-child{background:var(--bg-1);}
.cmp-table tbody th{background:var(--bg-2);color:var(--ink-2);font-weight:400;text-transform:uppercase;letter-spacing:0.18em;font-size:9.5px;width:120px;}
.cmp-table td{color:var(--ink-0);}
.cmp-table td.best{color:var(--accent);background:var(--accent-soft);}
.cmp-table td.na{color:var(--ink-3);}
.cmp-modal{width:min(960px,100%);max-height:88vh;background:var(--bg-1);border:1px solid var(--accent-line);position:relative;overflow:auto;padding:28px;}
.cmp-modal h2{font-family:var(--display);font-size:26px;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 18px;}

/* Detail page */
.detail{padding:24px 28px 90px;max-width:1180px;margin:0 auto;}
.detail-back{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-1);background:transparent;border:1px solid var(--line);padding:8px 14px;cursor:pointer;margin-bottom:22px;transition:all 0.15s;}
.detail-back:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.detail-id{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.3em;}
.detail-name{font-family:var(--display);font-size:46px;letter-spacing:0.05em;text-transform:uppercase;margin:6px 0 2px;line-height:0.95;}
.detail-mfr{font-family:var(--mono);font-size:12px;color:var(--ink-2);letter-spacing:0.2em;margin-bottom:22px;}
.detail-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:22px;align-items:start;}
@media (max-width:900px){.detail-grid{grid-template-columns:1fr;}}
.detail-art{position:relative;border:1px solid var(--line-2);background:linear-gradient(180deg,var(--bg-2),var(--bg-1));aspect-ratio:4 / 3;overflow:hidden;color:var(--accent);}
.detail-art .lbl-tl{position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:0.3em;z-index:2;}
.detail-art .lbl-bl{position:absolute;bottom:12px;left:12px;right:12px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:0.2em;}
.detail-radar{border:1px solid var(--line);background:var(--bg-1);padding:18px;margin-top:22px;}
.detail-radar h4{font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--ink-2);margin:0 0 6px;text-transform:uppercase;}
.detail-radar svg{max-width:300px;display:block;margin:0 auto;}
.detail-summary{color:var(--ink-1);margin:0 0 20px;font-size:14px;line-height:1.6;}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}

/* Sensor info-blocks (no schematic image) */
.sensor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media (max-width:1080px){.sensor-grid{grid-template-columns:1fr;}}
.sblock{position:relative;background:var(--bg-1);border:1px solid var(--line);padding:22px 24px;display:flex;flex-direction:column;cursor:pointer;transition:all 0.18s ease;}
.sblock:hover{border-color:var(--accent);background:var(--bg-2);box-shadow:0 6px 30px -14px var(--accent-soft),0 0 0 1px var(--accent-line) inset;}
.sblock-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.sblock-num{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;color:var(--ink-2);text-transform:uppercase;}
.sblock-num b{color:var(--accent);font-weight:500;}
.sblock-geo{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--ink-1);border:1px solid var(--line);padding:5px 10px;display:inline-flex;gap:8px;align-items:center;white-space:nowrap;}
.sblock-title{display:flex;align-items:center;gap:16px;margin-top:16px;}
.sblock-ic{width:54px;height:54px;border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;border-radius:50%;flex-shrink:0;}
.sblock-name{font-family:var(--display);font-size:30px;letter-spacing:0.04em;margin:0;line-height:1;text-transform:none;}
.sblock-sub{font-family:var(--mono);font-size:12px;letter-spacing:0.06em;color:var(--accent);margin-top:7px;}
.sblock-summary{color:var(--ink-1);font-size:14px;line-height:1.6;margin:18px 0 0;}
.sblock-summary.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.why{border-left:3px solid var(--accent);background:var(--bg-2);padding:14px 18px;margin-top:18px;}
.why h6{font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--accent);margin:0 0 6px;}
.why p{margin:0;color:var(--ink-0);font-size:13.5px;line-height:1.55;}
.sblock-specs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:18px;}
.sblock-specs>div{background:var(--bg-1);padding:12px 14px;}
.sblock-specs .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--ink-2);margin-bottom:5px;text-transform:uppercase;}
.sblock-specs .val{font-size:13.5px;color:var(--ink-0);line-height:1.4;}
.sblock-specs .val.na{color:var(--ink-3);}
.sblock-specs .val.price{color:var(--accent);font-family:var(--mono);letter-spacing:0.04em;}
.sblock-specs a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent-line);}
.sblock-specs a:hover{filter:brightness(1.15);}
.sblock-foot{display:flex;justify-content:flex-end;gap:6px;margin-top:16px;}

.divider{height:1px;background:var(--line);margin:14px 0;}
</style>
</head>

    <div className="stat-row">
      <span className="lbl">{label}</span>
      <div className="bar"><i style={{ width: `${pct}%`, background: accent }}/></div>
      <span className={`val ${na ? "na" : ""}`}>{na ? "—" : `${value}${unit}`}</span>
    </div>
  );
};

const Radar = ({ data, accent }) => {
  const cx=100,cy=100,R=72,n=data.length;
  const angle = i => (Math.PI*2*i)/n - Math.PI/2;
  const rings=[0.25,0.5,0.75,1.0];
  const ringPts = k => Array.from({length:n}).map((_,i)=>{const a=angle(i);return `${cx+Math.cos(a)*R*k},${cy+Math.sin(a)*R*k}`;}).join(" ");
  const dataPts = data.map((d,i)=>{const k=Math.max(0,d.value)/100;const a=angle(i);return `${cx+Math.cos(a)*R*k},${cy+Math.sin(a)*R*k}`;}).join(" ");
  return (
    <svg viewBox="0 0 200 200" width="100%">
      <g stroke="rgba(255,255,255,0.1)" fill="none">
        {rings.map((k,i)=><polygon key={i} points={ringPts(k)}/>)}
        {data.map((_,i)=>{const a=angle(i);return <line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*R} y2={cy+Math.sin(a)*R}/>;})}
      </g>
      <polygon points={dataPts} fill={accent} fillOpacity="0.18" stroke={accent} strokeWidth="1.5"/>
      {data.map((d,i)=>{const k=Math.max(0,d.value)/100;const a=angle(i);return <circle key={i} cx={cx+Math.cos(a)*R*k} cy={cy+Math.sin(a)*R*k} r="3" fill={accent}/>;})}
      {data.map((d,i)=>{const a=angle(i);const lx=cx+Math.cos(a)*(R+16);const ly=cy+Math.sin(a)*(R+16)+3;return (<text key={i} x={lx} y={ly} fill="rgba(255,255,255,0.6)" fontSize="9" textAnchor="middle" fontFamily="ui-monospace, monospace" letterSpacing="1">{d.label}</text>);})}
    </svg>
  );
};

const CompareModal = ({ uavs, onClose }) => {
  const best = {};
  CMP_ROWS.filter(r=>r.num&&r.hi).forEach(r=>{
    const vals = uavs.map(u=>u[r.k]).filter(v=>v!=null);
    best[r.k] = vals.length ? Math.max(...vals) : null;
  });
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="cmp-modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><Icon name="x" size={12}/></button>

            {CMP_ROWS.map(r=>(
              <tr key={r.k}>
                <th>{r.label}</th>
                {uavs.map(u=>{
                  const v=u[r.k];
                  const na=v==null;
                  const isBest=r.hi&&!na&&best[r.k]!=null&&v===best[r.k]&&uavs.length>1;
                  let disp=na?"—":(r.num?`${v}${r.unit||""}`:String(v).toUpperCase());
                  return <td key={u.id} className={`${na?"na":""} ${isBest?"best":""}`}>{disp}</td>;

            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

  if (kind==="acoustic") return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.4"><circle cx="7.5" cy="12" r="2.2" fill={c}/><path d="M12 8 Q15 12 12 16"/><path d="M15.5 6 Q20 12 15.5 18"/></svg>);
  if (kind==="passive") return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.4"><line x1="12" y1="20" x2="12" y2="9"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/><circle cx="12" cy="20" r="1.3" fill={c}/></svg>);
  if (kind==="rf") return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.4"><line x1="4" y1="18.5" x2="20" y2="18.5"/><rect x="5.5" y="12" width="2.4" height="6.5" fill={c} stroke="none"/><rect x="10" y="8" width="2.4" height="10.5" fill={c} stroke="none"/><rect x="14.5" y="10.5" width="2.4" height="8" fill={c} stroke="none"/></svg>);
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.4"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill={c}/><line x1="12" y1="12" x2="20" y2="6.5"/></svg>);
};

const SensorCard = ({ s, n, accent, isFav, onFav, onOpen }) => {
  const [flag, code] = geo(s.country);
  const w = whyText(s);
  const specs = sensorSpecs(s).slice(0, 6);
  return (
    <div className="sblock" onClick={()=>onOpen(s)}>
      <div className="sblock-top">
        <div className="sblock-num"><b>{String(n).padStart(2,"0")}.</b> {catShort(s)} · {(s.subtype||"").toUpperCase()}</div>
        <div className="sblock-geo">{flag} {code}</div>
      </div>
      <div className="sblock-title">
        <div className="sblock-ic"><SensorGlyph kind={sensorKind(s)}/></div>
        <div>
          <h3 className="sblock-name">{s.name}</h3>
          <div className="sblock-sub">{sensorSubtitle(s)}</div>
        </div>
      </div>
      <p className="sblock-summary clamp">{s.summary}</p>
      {w && (<div className="why"><h6>WHY IT MATTERS</h6><p>{w}</p></div>)}
      <div className="sblock-specs">
        {specs.map((sp,i)=>(<div key={i}><div className="lbl">{sp.lbl}</div><div className={`val ${sp.cls||""}`}>{sp.val}</div></div>))}
      </div>
      <div className="sblock-foot" onClick={(e)=>e.stopPropagation()}>
        <button className={`icon-btn ${isFav?"on":""}`} title="Favorite" onClick={()=>onFav(s.id)}><Icon name="star"/></button>
        <button className="icon-btn" title="Details" onClick={()=>onOpen(s)}><Icon name="arrow"/></button>
      </div>
    </div>
  );
};

const SensorSidebar = ({ filters, setFilters, counts, total }) => {
  const F = window.SENSOR_FILTERS;
  const tog = (k,v)=>setFilters(f=>({...f,[k]:f[k].includes(v)?f[k].filter(x=>x!==v):[...f[k],v]}));
  const reset = ()=>setFilters({category:[],subtype:[],country:[],company:[],minDetect:0});
  return (
    <aside className="sidebar">
      <div className="sidebar-frame-corner">// SENSOR FILTER · v1.0</div>
      <ChipGroup label="CATEGORY" options={F.category} selected={filters.category} onToggle={v=>tog("category",v)} counts={counts.category}/>
      <ChipGroup label="SUBTYPE" options={F.subtype} selected={filters.subtype} onToggle={v=>tog("subtype",v)} counts={counts.subtype}/>
      <ChipGroup label="COUNTRY" options={F.country} selected={filters.country} onToggle={v=>tog("country",v)} counts={counts.country}/>
      <ChipGroup label="MANUFACTURER" options={F.company} selected={filters.company} onToggle={v=>tog("company",v)} counts={counts.company}/>
      <RangeFilter label="MIN DETECTION" min={0} max={SMAX.detection} unit="km" value={filters.minDetect} onChange={v=>setFilters(f=>({...f,minDetect:v}))}/>
      <div className="reset-row">
        <button className="btn ghost sm" onClick={reset}>RESET</button>
        <div style={{flex:1}}/>
        <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--ink-2)",letterSpacing:"0.15em",alignSelf:"center"}}>{total} SENSORS</span>
      </div>
    </aside>
  );
};

const SensorsCatalogue = ({ accent }) => {
  const data = window.SENSOR_DATA;
  const [filters,setFilters] = React.useState({category:[],subtype:[],country:[],company:[],minDetect:0});
  const [favs,setFavs] = React.useState([]);
  const [search,setSearch] = React.useState("");
  const [sortBy,setSortBy] = React.useState("default");
  const filtered = React.useMemo(()=>{
    let r = data.filter(s=>{
      if (filters.category.length && !filters.category.includes(s.category)) return false;
      if (filters.subtype.length && !filters.subtype.includes(s.subtype)) return false;
      if (filters.country.length && !filters.country.includes(s.country)) return false;
      if (filters.company.length && !filters.company.includes(s.company)) return false;
      if ((s.detection_km||0) < filters.minDetect) return false;
      if (search) { const q=search.toLowerCase(); if (!((s.name||"").toLowerCase().includes(q)||(s.company||"").toLowerCase().includes(q)||(s.id||"").toLowerCase().includes(q)||(s.subtype||"").toLowerCase().includes(q))) return false; }
      return true;
    });
    if (sortBy==="detect") r=[...r].sort((a,b)=>(b.detection_km==null?-1:b.detection_km)-(a.detection_km==null?-1:a.detection_km));
    if (sortBy==="name") r=[...r].sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    return r;
  },[data,filters,search,sortBy]);
  const counts = React.useMemo(()=>{ const c={category:{},subtype:{},country:{},company:{}}; data.forEach(s=>["category","subtype","country","company"].forEach(k=>{ if(s[k]) c[k][s[k]]=(c[k][s[k]]||0)+1; })); return c; },[data]);
  const toggleFav = id=>setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]);
  const navOpen = s=>{ window.location.hash = "#/sensor/"+encodeURIComponent(s.id); };
  return (
    <div className="main-grid">
      <SensorSidebar filters={filters} setFilters={setFilters} counts={counts} total={filtered.length}/>
      <main className="catalogue">
        <div className="cat-header">
          <div className="title-block"><h2>// SENSORS/DETECTION</h2><div className="count"><b>{filtered.length}</b> / {data.length} SENSORS · {favs.length} FAVS</div></div>
          <div className="cat-controls">
            <div style={{display:"flex",alignItems:"center",gap:6,border:"1px solid var(--line)",background:"var(--bg-2)",padding:"4px 8px"}}>
              <Icon name="search" size={12}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="SEARCH ID, NAME, MFR..." style={{background:"transparent",border:"none",outline:"none",color:"var(--ink-0)",fontFamily:"var(--mono)",fontSize:10,letterSpacing:"0.15em",width:200}}/>
            </div>
            <select className="sort-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="default">SORT · DEFAULT</option>
              <option value="detect">SORT · DETECTION</option>
              <option value="name">SORT · NAME</option>
            </select>
          </div>
        </div>
        <div className="cat-note"><b>REVIEW-STAGE DATA</b> — {data.length} C-UAS sensors (active radar, passive RF, acoustic) across the global landscape. Many specs (detection range, band) are unpublished or classified and shown as “—”. Open any sensor for its source link and review notes. Not for procurement decisions.</div>
        {filtered.length>0 ? (
          <div className="sensor-grid">{filtered.map((s,i)=>(<SensorCard key={s.id} s={s} n={i+1} accent={accent} isFav={favs.includes(s.id)} onFav={toggleFav} onOpen={navOpen}/>))}</div>
        ) : (
          <div style={{padding:"60px",textAlign:"center",fontFamily:"var(--mono)",letterSpacing:"0.2em",color:"var(--ink-2)",border:"1px dashed var(--line)"}}>
            <div style={{fontSize:14,color:accent,marginBottom:8}}>// NO SENSORS MATCH FILTER</div><div style={{fontSize:11}}>RELAX CONSTRAINTS OR RESET</div>
          </div>
        )}
      </main>
    </div>
  );
};

const SensorDetail = ({ s, accent, onBack }) => {
  const [flag, code] = geo(s.country);
  const w = whyText(s);
  const cat = (s.category && s.category.indexOf("Acoustic")>=0) ? "ACOUSTIC SENSOR" : "RADAR / C-UAS SENSOR";
  const specs = sensorSpecs(s);
  return (
    <div className="detail" style={{maxWidth:900}}>
      <button className="detail-back" onClick={onBack}><span style={{transform:"rotate(180deg)",display:"inline-flex"}}><Icon name="arrow" size={12}/></span> BACK TO SENSORS</button>
      <div className="sblock-top">
        <div className="sblock-num"><b>{s.id}.</b> {cat} · {(s.subtype||"").toUpperCase()}</div>
        <div className="sblock-geo">{flag} {code} · {s.country}</div>
      </div>
      <div className="sblock-title" style={{marginTop:18}}>
        <div className="sblock-ic" style={{width:64,height:64}}><SensorGlyph kind={sensorKind(s)} size={30}/></div>
        <div>
          <h1 className="sblock-name" style={{fontSize:42}}>{s.name}</h1>
          <div className="sblock-sub" style={{fontSize:13}}>{s.company} · {sensorSubtitle(s)}</div>
        </div>
      </div>
      <p className="sblock-summary" style={{marginTop:22,fontSize:15}}>{s.summary}</p>
      {w && (<div className="why"><h6>WHY IT MATTERS</h6><p>{w}</p></div>)}
      <div className="sblock-specs" style={{marginTop:20}}>
        {specs.map((sp,i)=>(<div key={i}><div className="lbl">{sp.lbl}</div><div className={`val ${sp.cls||""}`}>{sp.val}</div></div>))}
        <div><div className="lbl">CONFIDENCE</div><div className="val" style={{color:s.confidence==="Low"?"var(--warn)":s.confidence==="High"?"var(--good)":"var(--ink-0)"}}>{s.confidence?s.confidence.toUpperCase():"—"}</div></div>
        <div><div className="lbl">WEBSITE</div><div className="val">{s.website ? <a href={s.website} target="_blank" rel="noopener noreferrer">{webHost(s.website)}</a> : "—"}</div></div>
      </div>
      <div className="modal-actions">
        <a className="btn primary" href={s.website} target="_blank" rel="noopener noreferrer">VIEW SOURCE <Icon name="ext"/></a>
      </div>
      <div className="source-note"><b>REVIEW STAGE</b> — mapped from a curated landscape file; many specs are vendor-stated or parsed from prose. {s.note}</div>
    </div>
  );
};

Object.assign(window, { UAVCard, Sidebar, DetailPage, CompareTray, CompareModal, Icon, SensorsCatalogue, SensorDetail });
</script>

<!-- ============ APP ============ -->
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

function App() {
  const accent = "#ff7a1a";
  const layout = "stat-heavy";
  const columns = 4;

  const data = window.UAV_DATA;
  const [filters, setFilters] = useState({ cls:[], role:[], frame:[], manufacturer:[], minRange:0, minPayload:0 });
  const [favs, setFavs] = useState([]);
  const [compare, setCompare] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const [sortBy, setSortBy] = useState("default");
  const [search, setSearch] = useState("");

  // Hash routing — each item opens as a full page (shareable URL, browser back/forward)
  const parseHash = () => {
    const h = window.location.hash || "";
    let m;
    if ((m = h.match(/^#\/uav\/(.+)$/)))    return { view:"uav-detail", id: decodeURIComponent(m[1]) };
    if ((m = h.match(/^#\/sensor\/(.+)$/))) return { view:"sensor-detail", id: decodeURIComponent(m[1]) };
    if (h === "#/sensors")                  return { view:"sensors" };
    return { view:"catalogue" };
  };
  const [route, setRoute] = useState(parseHash());
  useEffect(() => {
    const f = () => setRoute(parseHash());
    window.addEventListener("hashchange", f);
    return () => window.removeEventListener("hashchange", f);
  }, []);
  useEffect(() => { if (route.view === "detail") window.scrollTo(0,0); }, [route]);
  const navOpen = (uav) => { window.location.hash = "#/uav/" + encodeURIComponent(uav.id); };
  const navHome = () => { window.location.hash = ""; };

  const filtered = useMemo(() => {
    let r = data.filter(u => {
      if (filters.cls.length && !filters.cls.includes(u.cls)) return false;
      if (filters.role.length && !filters.role.includes(u.role)) return false;
      if (filters.frame.length && !filters.frame.includes(u.frame)) return false;
      if (filters.manufacturer.length && !filters.manufacturer.includes(u.manufacturer)) return false;
      if ((u.range_km||0) < filters.minRange) return false;
      if ((u.payload_kg||0) < filters.minPayload) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!(u.name.toLowerCase().includes(q) || u.codename.toLowerCase().includes(q) || u.id.toLowerCase().includes(q) || u.manufacturer.toLowerCase().includes(q))) return false;
      }
      return true;
    });
    const by = (sel) => (a,b) => (sel(b)??-1) - (sel(a)??-1);
    if (sortBy==="range") r=[...r].sort(by(u=>u.range_km));
    if (sortBy==="endurance") r=[...r].sort(by(u=>u.flight_min));
    if (sortBy==="payload") r=[...r].sort(by(u=>u.payload_kg));
    if (sortBy==="speed") r=[...r].sort(by(u=>u.speed));
    return r;
  }, [data, filters, sortBy, search]);

  const counts = useMemo(() => {
    const c = { cls:{}, role:{}, frame:{}, manufacturer:{} };
    data.forEach(u => { ["cls","role","frame","manufacturer"].forEach(k => { c[k][u[k]] = (c[k][u[k]]||0)+1; }); });
    return c;
  }, [data]);

  const toggleFav = id => setFavs(f => f.includes(id) ? f.filter(x=>x!==id) : [...f,id]);
  const toggleCompare = id => setCompare(c => {
    if (c.includes(id)) return c.filter(x=>x!==id);
    if (c.length>=3) return [...c.slice(1), id];
    return [...c, id];
  });

  const compareUAVs = compare.map(id => data.find(u=>u.id===id)).filter(Boolean);
  const detailUAV = route.view === "uav-detail" ? data.find(u=>u.id===route.id) : null;
  const sensor = route.view === "sensor-detail" ? (window.SENSOR_DATA||[]).find(s=>s.id===route.id) : null;
  const onSensors = route.view === "sensors" || route.view === "sensor-detail";

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M8 1 L14 5 L14 11 L8 15 L2 11 L2 5 Z"/>
              <path d="M8 4 L11 6 L11 10 L8 12 L5 10 L5 6 Z" fill="currentColor"/>
            </svg>
          </div>
          <div className="brand-text">
            <span className="b1">xSonomy</span>
            <span className="b2">AUTONOMOUS UNMANNED SYSTEMS</span>
          </div>
        </div>
        <nav className="topbar-nav">
          <a className={onSensors?"":"active"} onClick={()=>{window.location.hash="";}}>UAVs</a>
          <a className={onSensors?"active":""} onClick={()=>{window.location.hash="#/sensors";}}>SENSORS/DETECTION</a>
        </nav>
        <div className="topbar-meta">
          <span><span className="pulse"/>STAGE 1 · CATALOGUE</span>
          <span>{onSensors ? (window.SENSOR_DATA||[]).length+" SENSORS · GLOBAL" : data.length+" UAVS · PL + UA"}</span>
        </div>
      </header>

      {route.view==="uav-detail" && detailUAV ? (
        <DetailPage uav={detailUAV} accent={accent} onBack={navHome}
          isCompare={compare.includes(detailUAV.id)} onCompare={id=>toggleCompare(id)}/>
      ) : route.view==="sensor-detail" && sensor ? (
        <SensorDetail s={sensor} accent={accent} onBack={()=>{window.location.hash="#/sensors";}}/>
      ) : route.view==="sensors" ? (
        <SensorsCatalogue accent={accent}/>
      ) : (
      <>
      <div className="main-grid">
        <Sidebar filters={filters} setFilters={setFilters} counts={counts} total={filtered.length}/>
        <main className="catalogue">
          <div className="cat-header">
            <div className="title-block">
              <h2>// CATALOGUE</h2>
              <div className="count"><b>{filtered.length}</b> / {data.length} UNITS · {favs.length} FAVS</div>
            </div>
            <div className="cat-controls">
              <div style={{display:"flex",alignItems:"center",gap:6,border:"1px solid var(--line)",background:"var(--bg-2)",padding:"4px 8px"}}>
                <Icon name="search" size={12}/>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="SEARCH ID, NAME, MFR..."
                  style={{background:"transparent",border:"none",outline:"none",color:"var(--ink-0)",fontFamily:"var(--mono)",fontSize:10,letterSpacing:"0.15em",width:200}}/>
              </div>
              <select className="sort-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                <option value="default">SORT · DEFAULT</option>
                <option value="range">SORT · RANGE</option>
                <option value="endurance">SORT · ENDURANCE</option>
                <option value="payload">SORT · PAYLOAD</option>
                <option value="speed">SORT · SPEED</option>
              </select>
            </div>
          </div>

          <div className="cat-note">
            <b>REVIEW-STAGE DATA</b> — {data.length} units, Poland + Ukraine wedge. Figures corroborated from manufacturer and secondary sources; values that conflict or were unpublished are shown as “—”. Open any unit to see its source link and review notes. Not for procurement decisions.
          </div>

          {filtered.length > 0 ? (
            <div className={`uav-grid cols-${columns}`}>
              {filtered.map(uav => (
                <UAVCard key={uav.id} uav={uav} accent={accent} layout={layout}
                  isFav={favs.includes(uav.id)} isCompare={compare.includes(uav.id)}
                  onFav={toggleFav} onCompare={toggleCompare} onOpen={navOpen}/>
              ))}
            </div>
          ) : (
            <div style={{padding:"60px",textAlign:"center",fontFamily:"var(--mono)",letterSpacing:"0.2em",color:"var(--ink-2)",border:"1px dashed var(--line)"}}>
              <div style={{fontSize:14,color:accent,marginBottom:8}}>// NO UNITS MATCH FILTER</div>
              <div style={{fontSize:11}}>RELAX CONSTRAINTS OR RESET</div>
            </div>
          )}
        </main>
      </div>

      <CompareTray ids={compare} uavs={data}
        onRemove={id=>setCompare(c=>c.filter(x=>x!==id))}
        onClear={()=>setCompare([])}
        onCompare={()=>setShowCompare(true)}/>
      </>
      )}

      {showCompare && compareUAVs.length>=2 && (
        <CompareModal uavs={compareUAVs} onClose={()=>setShowCompare(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

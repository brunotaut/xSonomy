name: Build & deploy catalogue

on:
  workflow_dispatch: {}          # run manually from the Actions tab
  schedule:
    - cron: "0 6 * * *"          # daily at 06:00 UTC — publishes newly-Live rows
  push:
    branches: [main]             # rebuild when the site code changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate static site from Supabase
        run: node scripts/generate-supabase.mjs
        env:
          SUPABASE_URL: https://uobidcahmrmfdmfbrtkt.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

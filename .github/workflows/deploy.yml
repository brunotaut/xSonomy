name: Build & publish catalogue

on:
  schedule:
    - cron: "0 5 * * *"        # daily at 05:00 UTC — pulls latest Airtable data
  workflow_dispatch: {}         # manual run from the Actions tab
  push:
    branches: [ main ]          # rebuild on any push to main

# Publish to GitHub Pages as an artifact (the site is built here, not committed).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build index.html (+ download images) from Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: node build/build.mjs

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp index.html _site/index.html
          [ -d images ] && cp -r images _site/images || true
          echo "xsonomy.com" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
